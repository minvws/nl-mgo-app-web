volumes:
    hapi-data:

services:
    mgo:
        container_name: mgo
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - ${PORT:-8000}:8000
        volumes:
            - .:/app
            - /app/node_modules
            - /app/apps/mgo/node_modules
            - /app/packages/fhir-client/node_modules
            - /app/packages/fhir-data/node_modules
            - /app/packages/mgo-ui/node_modules
            - /app/packages/tailwind/node_modules

    hapi:
        container_name: hapi
        image: smartonfhir/hapi-5:r3-smart
        ports:
            - 8080:8080
