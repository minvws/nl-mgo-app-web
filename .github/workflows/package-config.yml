name: Package - Config

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/workflows/package-config.yml'
      - 'packages/config/**'

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/package
        with:
          package-path: 'packages/config'
