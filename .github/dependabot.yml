version: 2

updates:
  - package-ecosystem: 'github-actions'
    open-pull-requests-limit: 5
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    # disable package updates to only allow security updates
    # see: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#open-pull-requests-limit
    # see: https://docs.github.com/en/code-security/dependabot/dependabot-security-updates/configuring-dependabot-security-updates#overriding-the-default-behavior-with-a-configuration-file
    open-pull-requests-limit: 0
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      commitlint:
        patterns:
          - '@commitlint/*'
      eslint:
        patterns:
          - '@tanstack/eslint-*'
          - '@typescript-eslint/*'
          - 'eslint-plugin-*'
          - 'eslint'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      react-router:
        patterns:
          - 'react-router'
          - 'react-router-dom'
      storybook:
        patterns:
          - '@storybook/*'
          - 'storybook-*'
          - 'storybook'
